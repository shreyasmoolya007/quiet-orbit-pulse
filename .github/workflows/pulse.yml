name: Quiet Orbit
run-name: Signal poll

on:
  schedule:
    - cron: "3-59/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: quiet-orbit-pulse
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Read public state
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Load private runtime
        env:
          CORE_DEPLOY_KEY: ${{ secrets.CORE_DEPLOY_KEY }}
        run: |
          set -eu
          install -m 700 -d ~/.ssh
          printf '%s\n' "$CORE_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H github.com > ~/.ssh/known_hosts
          git clone --quiet --depth 1 git@github.com:shreyasmoolya007/quiet-orbit-core.git .runtime
          cp docs/status.json .runtime/docs/status.json

      - name: Poll signal
        id: monitor
        run: node --experimental-strip-types .runtime/scripts/cloud-check.ts

      - name: Send generic assigned notification
        if: steps.monitor.outputs.available == 'true' && steps.monitor.outputs.transition == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Quiet Orbit signal detected" \
            --body "A private availability match was confirmed at $(date -u +'%Y-%m-%d %H:%M UTC'). Open your private tracker and act immediately." \
            --assignee "${{ github.repository_owner }}"

      - name: Prepare public state
        if: steps.monitor.outputs.transition == 'true'
        run: |
          node -e "const fs=require('fs');const s=JSON.parse(fs.readFileSync('.runtime/docs/status.json','utf8'));fs.writeFileSync('docs/status.json',JSON.stringify({available:s.available,fingerprint:s.fingerprint,lastTransitionAt:s.lastTransitionAt},null,2)+'\n')"

      - name: Maintain schedule activity
        run: |
          node -e "const fs=require('fs');fs.writeFileSync('docs/heartbeat.json',JSON.stringify({month:new Date().toISOString().slice(0,7)},null,2)+'\n')"

      - name: Save generic state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/status.json docs/heartbeat.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "Update signal state"
          git push

      - name: Remove runtime key
        if: always()
        run: rm -f ~/.ssh/id_ed25519

      - name: Raise match signal
        if: steps.monitor.outputs.available == 'true' && steps.monitor.outputs.transition == 'true'
        run: exit 1
